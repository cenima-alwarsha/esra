<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#19120c" />
    <title>أصفهان 1666</title>
    <link rel="preload" href="assets/images/scene-01.webp" as="image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="reader" aria-live="polite">
      <header class="reader__top">
        <div class="reader__title">
          <span class="reader__kicker">رواية مصوّرة</span>
          <h1 id="bookTitle">أصفهان 1666</h1>
        </div>
        <div class="reader__meta" id="sceneMeta">...</div>
      </header>

      <section class="book-stage" aria-label="قارئ الرواية">
        <div class="book" id="book">
          <div class="spine" aria-hidden="true"></div>

          <article class="page page--image" id="imagePage">
            <img id="sceneImage" alt="" />
            <div class="image-vignette" aria-hidden="true"></div>
            <div class="scene-badge">
              <span id="sceneTitle"></span>
            </div>
          </article>

          <article class="page page--text" id="textPage">
            <div class="paper-grain" aria-hidden="true"></div>
            <div class="page-mark">
              <span id="pageSource"></span>
              <span id="chunkSource"></span>
            </div>
            <p id="storyText"></p>
          </article>
        </div>
      </section>

      <footer class="reader__controls">
        <button class="icon-button" id="nextBtn" type="button" aria-label="الصفحة التالية" title="الصفحة التالية">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m15 18-6-6 6-6" />
          </svg>
        </button>

        <div class="progress" aria-label="تقدم القراءة">
          <div class="progress__bar">
            <span id="progressFill"></span>
          </div>
          <span id="progressText"></span>
        </div>

        <div class="tool-cluster" aria-label="أدوات القراءة">
          <button class="icon-button icon-button--small" id="fontDownBtn" type="button" aria-label="تصغير الخط" title="تصغير الخط">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 19h6" />
              <path d="m8 5 6 14" />
              <path d="M6 13h5" />
              <path d="M14 19h6" />
            </svg>
          </button>
          <button class="icon-button icon-button--small" id="fontUpBtn" type="button" aria-label="تكبير الخط" title="تكبير الخط">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 19h6" />
              <path d="m7 5 6 14" />
              <path d="M5 13h5" />
              <path d="M14 19h7" />
              <path d="M17.5 15.5v7" />
            </svg>
          </button>
        </div>

        <button class="icon-button" id="prevBtn" type="button" aria-label="الصفحة السابقة" title="الصفحة السابقة">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>
      </footer>
    </main>

    <script src="story-data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
